[workspace]
preview = ["pixi-build"]
name = "rewire-camera"
version = "0.1.0"
description = "Synthetic camera publishers for testing rewire"
channels = [
    "conda-forge",
    "https://prefix.dev/rewire"]
platforms = ["osx-arm64", "linux-64"]

[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[dependencies]
colcon-common-extensions = ">=0.3.0,<0.4"
numpy = ">=1.24"
opencv = ">=4"
python = ">=3.11"
rewire = "*"
zenohd = "*"

[feature.humble]
channels = ["robostack-humble"]

# [feature.humble.activation]
# env = { RMW_IMPLEMENTATION = "rmw_zenoh_cpp" }

[feature.humble.dependencies]
ros-humble-rmw-zenoh-cpp = "*"
ros-humble-ros2cli = ">=0.18.17,<0.19"
ros-humble-ros2launch = ">=0.19.13,<0.20"
ros-humble-ros2service = ">=0.18.17,<0.19"
ros-humble-rewire-camera = { path = "." }
ros-humble-ros2topic = ">=0.18.17,<0.19"
ros-humble-ros2doctor = ">=0.18.17,<0.19"

[feature.jazzy]
channels = ["robostack-jazzy"]

# [feature.jazzy.activation]
# env = { RMW_IMPLEMENTATION = "rmw_zenoh_cpp" }

[feature.jazzy.dependencies]
ros-jazzy-rmw-zenoh-cpp = "*"
ros-jazzy-ros2cli = ">=0.32.8,<0.33"
ros-jazzy-ros2launch = ">=0.26.11,<0.27"
ros-jazzy-ros2service = ">=0.32.8,<0.33"
ros-jazzy-rewire-camera = { path = "." }
ros-jazzy-ros2topic = ">=0.32.8,<0.33"
ros-jazzy-ros2doctor = ">=0.32.8,<0.33"
ros-jazzy-ros2node = ">=0.32.8,<0.33"
ros-jazzy-demo-nodes-cpp = ">=0.33.9,<0.34"
ros-jazzy-ros2run = ">=0.32.8,<0.33"

[feature.kilted]
channels = ["robostack-kilted"]

# [feature.kilted.activation]
# env = { RMW_IMPLEMENTATION = "rmw_zenoh_cpp" }

[feature.kilted.dependencies]
ros-kilted-rmw-zenoh-cpp = "*"
ros-kilted-ros2cli = ">=0.38.2,<0.39"
ros-kilted-ros2launch = ">=0.28.5,<0.29"
ros-kilted-ros2service = ">=0.38.2,<0.39"
ros-kilted-rewire-camera = { path = "." }
ros-kilted-ros2topic = ">=0.38.2,<0.39"
ros-kilted-ros2doctor = ">=0.38.2,<0.39"
ros-kilted-ros2node = ">=0.38.2,<0.39"
ros-kilted-demo-nodes-cpp = ">=0.36.4,<0.37"
ros-kilted-ros2run = ">=0.38.2,<0.39"

[environments]
default = ["humble"]
jazzy = ["jazzy"]
humble = ["humble"]
kilted = ["kilted"]
