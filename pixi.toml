[workspace]
preview = ["pixi-build"]
name = "rewire-camera"
version = "0.1.0"
description = "Synthetic camera publishers for testing rewire"
channels = [
    "conda-forge",
    "https://prefix.dev/rewire"]
platforms = ["osx-arm64", "linux-64"]

[package.build]
backend = { name = "pixi-build-ros", version = "*" }

[dependencies]
colcon-common-extensions = ">=0.3.0,<0.4"
numpy = ">=1.24"
opencv = ">=4"
python = ">=3.11"
rewire = "*"

[feature.humble]
channels = ["robostack-humble"]

[feature.humble.dependencies]
ros-humble-ros2cli = ">=0.18.17,<0.19"
ros-humble-ros2launch = ">=0.19.13,<0.20"
ros-humble-ros2service = ">=0.18.17,<0.19"
ros-humble-rewire-camera = { path = "." }

[feature.jazzy]
channels = ["robostack-jazzy"]

[feature.jazzy.dependencies]
ros-jazzy-ros2cli = ">=0.32.8,<0.33"
ros-jazzy-ros2launch = ">=0.26.11,<0.27"
ros-jazzy-ros2service = ">=0.32.8,<0.33"
ros-jazzy-rewire-camera = { path = "." }

[environments]
default = ["humble"]
jazzy = ["jazzy"]
humble = ["humble"]
